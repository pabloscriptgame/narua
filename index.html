<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NARUA RPG</title>
  <link rel="icon" type="image/png" href="https://iili.io/qsB9H21.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Oswald:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --purple:     #BF00FF;
      --purple2:    #8B00E6;
      --cyan:       #00FFFF;
      --dark:       #04020C;
      --deep:       #06000F;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--dark);
      font-family: 'Oswald', sans-serif;
    }

    /* ───── TUNNEL / WORMHOLE ───── */
    #tunnel-canvas {
      position: fixed; inset: 0; z-index: 0;
    }

    /* ───── VIGNETTE ───── */
    .vignette {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 30%,
        rgba(4,2,12,.7) 70%,
        rgba(4,2,12,.98) 100%);
    }

    /* ───── SCAN LINES ───── */
    .scanlines {
      position: fixed; inset: 0; z-index: 3; pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        rgba(0,0,0,.09) 3px, rgba(0,0,0,.09) 4px
      );
    }

    /* ───── GLITCH FLASH ───── */
    .glitch-overlay {
      position: fixed; inset: 0; z-index: 50; pointer-events: none;
      opacity: 0;
      background: rgba(191,0,255,.06);
      animation: glitchFlash 4s infinite;
    }
    @keyframes glitchFlash {
      0%,100%       { opacity: 0; transform: none; }
      10%           { opacity: 1; transform: skewX(.4deg); }
      10.5%         { opacity: 0; transform: none; }
      55%           { opacity: .5; transform: skewX(-.2deg) translateX(2px); }
      55.3%         { opacity: 0; transform: none; }
    }

    /* ───── CORNERS ───── */
    .corner {
      position: fixed; z-index: 20;
      width: 44px; height: 44px;
      opacity: .55;
      animation: cornerPulse 2.5s ease-in-out infinite alternate;
    }
    @keyframes cornerPulse { from { opacity:.35; } to { opacity:.75; } }
    .corner--tl { top:14px; left:14px;  border-top:2px solid var(--purple); border-left:2px solid var(--purple); }
    .corner--tr { top:14px; right:14px; border-top:2px solid var(--purple); border-right:2px solid var(--purple); }
    .corner--bl { bottom:14px; left:14px;  border-bottom:2px solid var(--purple); border-left:2px solid var(--purple); }
    .corner--br { bottom:14px; right:14px; border-bottom:2px solid var(--purple); border-right:2px solid var(--purple); }

    /* ───── HUD LINES ───── */
    .hud-h {
      position: fixed; z-index: 10; pointer-events: none;
      left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(191,0,255,.18), transparent);
    }
    .hud-h--t { top: 58px; }
    .hud-h--b { bottom: 58px; }
    .hud-v {
      position: fixed; z-index: 10; pointer-events: none;
      top: 0; bottom: 0; width: 1px;
      background: linear-gradient(180deg, transparent, rgba(191,0,255,.15), transparent);
    }
    .hud-v--l { left: 58px; }
    .hud-v--r { right: 58px; }

    /* ───── STAGE ───── */
    .stage {
      position: relative; z-index: 15;
      width: 100%; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 52px;
    }

    /* ───── LOGO ───── */
    .logo-wrap {
      position: fixed;
      top: max(22px, 4vh);
      left: 50%; transform: translateX(-50%);
      z-index: 30;
    }
    .logo-img {
      width: clamp(90px, 18vw, 140px);
      height: auto;
      filter:
        drop-shadow(0 0 16px rgba(191,0,255,.8))
        drop-shadow(0 0 40px rgba(191,0,255,.35));
      animation: logoPulse 3s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { filter: drop-shadow(0 0 14px rgba(191,0,255,.7)) drop-shadow(0 0 35px rgba(191,0,255,.3)); }
      50%      { filter: drop-shadow(0 0 24px rgba(191,0,255,1))  drop-shadow(0 0 55px rgba(191,0,255,.5)); }
    }

    /* ───── CHARACTER ───── */
    .char-wrap {
      position: relative;
      width: min(360px, 78vw);
      margin-bottom: -10px;
      animation: charFloat 3.2s ease-in-out infinite;
      z-index: 20;
    }
    @keyframes charFloat {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-16px); }
    }
    .char-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 68%; height: 28px;
      background: radial-gradient(ellipse, rgba(191,0,255,.5) 0%, transparent 70%);
      filter: blur(8px);
      animation: shadowPulse 3.2s ease-in-out infinite;
    }
    @keyframes shadowPulse {
      0%,100% { opacity:.55; width:62%; }
      50%      { opacity:.95; width:74%; }
    }
    .char-img {
      width: 100%; height: auto;
      filter:
        drop-shadow(0 0 28px rgba(191,0,255,.65))
        drop-shadow(0 0 60px rgba(191,0,255,.2))
        drop-shadow(-6px 22px 22px rgba(0,0,0,.98));
    }

    /* ───── CARD ───── */
    .redirect-card {
      position: relative;
      background: rgba(8,0,18,.8);
      border: 1px solid rgba(191,0,255,.28);
      border-radius: 3px;
      padding: 1.15rem 2.4rem 1.25rem;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(191,0,255,.06),
        0 0 50px rgba(191,0,255,.14),
        inset 0 1px 0 rgba(191,0,255,.1);
      backdrop-filter: blur(12px);
      animation: cardIn .7s cubic-bezier(.15,.85,.2,1) .25s both;
      margin-bottom: 8px;
      z-index: 20;
      overflow: hidden;
    }
    .card-shine {
      position: absolute;
      top: 0; left: -60%;
      width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(191,0,255,.07), transparent);
      animation: cardShine 4s ease-in-out infinite;
    }
    @keyframes cardShine {
      0%   { left: -60%; }
      60%  { left: 140%; }
      100% { left: 140%; }
    }
    @keyframes cardIn {
      from { opacity:0; transform: translateY(24px) scale(.97); }
      to   { opacity:1; transform: none; }
    }

    .card-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: .62rem;
      letter-spacing: 4px;
      color: rgba(191,0,255,.55);
      text-transform: uppercase;
      margin-bottom: .45rem;
    }
    .card-title {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(1.4rem, 4.5vw, 2rem);
      letter-spacing: 6px;
      color: #fff;
      text-shadow: 0 0 22px rgba(191,0,255,.5);
    }
    .card-title span { color: var(--purple); }

    /* ───── COUNTDOWN ───── */
    .countdown-wrap {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin-top: .9rem;
    }
    .ring-svg { width: 54px; height: 54px; }
    .ring-bg  { fill: none; stroke: rgba(191,0,255,.1); stroke-width: 3; }
    .ring-arc {
      fill: none; stroke: var(--purple); stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 138; stroke-dashoffset: 0;
      transform: rotate(-90deg); transform-origin: center;
      transition: stroke-dashoffset 1s linear;
      filter: drop-shadow(0 0 4px var(--purple));
    }
    .ring-num {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.35rem;
      fill: var(--purple);
    }
    .cd-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: .72rem;
      letter-spacing: 2px;
      color: rgba(255,255,255,.38);
      text-transform: uppercase;
      text-align: left;
      line-height: 1.8;
    }
    .cd-text strong { color: rgba(191,0,255,.85); display: block; }

    /* ───── PROGRESS ───── */
    .prog-bar {
      width: 210px; height: 2px;
      background: rgba(255,255,255,.05);
      border-radius: 2px;
      margin: .9rem auto 0;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple2), var(--purple), #00FFFF);
      box-shadow: 0 0 10px var(--purple);
      transform-origin: left;
      animation: progDrain 5s linear forwards;
    }
    @keyframes progDrain {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    /* ───── WARP / ZOOM TRANSITION ───── */
    #warp-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: radial-gradient(circle at center, #BF00FF 0%, #06000F 60%);
      transform: scale(0);
      opacity: 0;
      border-radius: 50%;
      transition: none;
      pointer-events: none;
    }
    #warp-overlay.go {
      animation: warpIn .9s cubic-bezier(.65,0,.35,1) forwards;
    }
    @keyframes warpIn {
      0%   { transform: scale(0); opacity: 1; border-radius: 50%; }
      60%  { transform: scale(1.6); opacity: 1; border-radius: 0; }
      100% { transform: scale(3);  opacity: 1; border-radius: 0; }
    }

  </style>
</head>
<body>

  <!-- Tunnel canvas -->
  <canvas id="tunnel-canvas"></canvas>

  <!-- Atmosphere -->
  <div class="vignette"></div>
  <div class="scanlines"></div>
  <div class="glitch-overlay"></div>

  <!-- HUD frame -->
  <div class="hud-h hud-h--t"></div>
  <div class="hud-h hud-h--b"></div>
  <div class="hud-v hud-v--l"></div>
  <div class="hud-v hud-v--r"></div>

  <!-- Corners -->
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <!-- Warp transition -->
  <div id="warp-overlay"></div>

  <!-- Logo -->
  <div class="logo-wrap">
    <img class="logo-img" src="https://iili.io/qsB9H21.png" alt="NARUA RPG">
  </div>

  <!-- Stage -->
  <div class="stage">

    <!-- Character -->
    <div class="char-wrap">
      <img class="char-img"
           src="https://i.ibb.co/bjXDLdMX/personagem-narua-original.png"
           alt="Personagem NARUA RPG">
    </div>

    <!-- Card -->
    <div class="redirect-card">
      <div class="card-shine"></div>
      <div class="card-label">▸ Sincronizando consciência</div>
      <div class="card-title">NARUA <span>RPG</span></div>

      <div class="countdown-wrap">
        <svg class="ring-svg" viewBox="0 0 46 46">
          <circle class="ring-bg"  cx="23" cy="23" r="22"/>
          <circle class="ring-arc" cx="23" cy="23" r="22" id="ringArc"/>
          <text class="ring-num" x="23" y="28" text-anchor="middle" id="cdNum">5</text>
        </svg>
        <div class="cd-text">
          <strong id="cdMsg">Iniciando portal…</strong>
          naruarpg.gamer.gd
        </div>
      </div>

      <div class="prog-bar">
        <div class="prog-fill"></div>
      </div>
    </div>

  </div>

  <script>
  /* ════════════════════════════════
     TUNNEL / WORMHOLE CANVAS
  ════════════════════════════════ */
  const canvas = document.getElementById('tunnel-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, CX, CY;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    CX = W / 2; CY = H / 2;
  }
  window.addEventListener('resize', resize);
  resize();

  // Tunnel rings config
  const RINGS    = 24;
  const SPEED    = 1.6;          // ring travel speed
  let   camZoom  = 1;            // zoom multiplier (grows on exit)
  let   rings    = [];

  // Pre-generate ring "spokes"
  const SPOKES = 12;

  function mkRing(z) {
    return {
      z,                            // 0 = far, 1 = near
      hue:   270 + Math.random() * 60 - 30,   // purple range
      cyan:  Math.random() > .7,
      twist: Math.random() * Math.PI * 2,
    };
  }

  for (let i = 0; i < RINGS; i++) {
    rings.push(mkRing(i / RINGS));
  }

  let t = 0;
  let warpActive = false;

  function drawTunnel() {
    ctx.clearRect(0, 0, W, H);

    // Deep space gradient center
    const grad = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.min(W, H) * 0.55);
    grad.addColorStop(0,   'rgba(30,0,60,.55)');
    grad.addColorStop(.5,  'rgba(10,0,25,.4)');
    grad.addColorStop(1,   'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Sort far → near
    const sorted = [...rings].sort((a, b) => a.z - b.z);

    sorted.forEach(ring => {
      const perspScale = ring.z;                          // 0=tiny, 1=full
      const radius     = perspScale * Math.min(W, H) * .65 * camZoom;
      const alpha      = perspScale * .75;

      if (radius < 2) return;

      const color = ring.cyan
        ? `rgba(0,255,255,${alpha * .5})`
        : `rgba(191,0,255,${alpha})`;

      // Main ring
      ctx.beginPath();
      ctx.arc(CX, CY, radius, 0, Math.PI * 2);
      ctx.strokeStyle = color;
      ctx.lineWidth   = ring.cyan ? 1 : 1.5;
      ctx.globalAlpha = alpha;
      ctx.shadowColor = ring.cyan ? '#00FFFF' : '#BF00FF';
      ctx.shadowBlur  = 18 * perspScale;
      ctx.stroke();

      // Spokes
      for (let s = 0; s < SPOKES; s++) {
        const angle  = (s / SPOKES) * Math.PI * 2 + ring.twist + t * .004;
        const innerR = radius * .18;
        ctx.beginPath();
        ctx.moveTo(CX + Math.cos(angle) * innerR,  CY + Math.sin(angle) * innerR);
        ctx.lineTo(CX + Math.cos(angle) * radius,  CY + Math.sin(angle) * radius);
        ctx.strokeStyle = `rgba(191,0,255,${alpha * .2})`;
        ctx.lineWidth   = .5;
        ctx.shadowBlur  = 0;
        ctx.stroke();
      }
    });

    ctx.globalAlpha = 1;
    ctx.shadowBlur  = 0;

    // Bright core glow
    const coreR = warpActive ? 120 + camZoom * 80 : 60 + Math.sin(t * .04) * 10;
    const coreG = ctx.createRadialGradient(CX, CY, 0, CX, CY, coreR);
    coreG.addColorStop(0,   `rgba(191,0,255,${warpActive ? .9 : .3})`);
    coreG.addColorStop(.45, `rgba(139,0,230,${warpActive ? .4 : .1})`);
    coreG.addColorStop(1,   'transparent');
    ctx.fillStyle = coreG;
    ctx.fillRect(0, 0, W, H);

    // Floating synaptic dots
    for (let d = 0; d < 28; d++) {
      const ang  = (d / 28) * Math.PI * 2 + t * .008;
      const dist = 80 + Math.sin(d * 1.3 + t * .02) * 60;
      const px   = CX + Math.cos(ang) * dist * camZoom;
      const py   = CY + Math.sin(ang) * dist * .55 * camZoom;
      const a    = (.3 + Math.sin(d + t * .06) * .2) * (warpActive ? 1.5 : 1);
      ctx.beginPath();
      ctx.arc(px, py, 1.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(191,0,255,${Math.min(a, 1)})`;
      ctx.shadowColor = '#BF00FF';
      ctx.shadowBlur  = 8;
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function updateRings() {
    const spd = warpActive ? SPEED * 4 : SPEED;
    rings.forEach(r => {
      r.z += spd * .003;
      if (r.z > 1) {
        r.z   = 0.02;
        r.hue = 270 + Math.random() * 60 - 30;
        r.cyan  = Math.random() > .7;
        r.twist = Math.random() * Math.PI * 2;
      }
    });
    if (warpActive) camZoom = Math.min(camZoom * 1.04, 3.5);
  }

  function loop() {
    t++;
    updateRings();
    drawTunnel();
    requestAnimationFrame(loop);
  }
  loop();

  /* ════════════════════════════════
     COUNTDOWN + WARP REDIRECT
  ════════════════════════════════ */
  const TOTAL   = 5;
  const ARC_LEN = 138;
  const arc     = document.getElementById('ringArc');
  const numEl   = document.getElementById('cdNum');
  const msgEl   = document.getElementById('cdMsg');
  const msgs    = [
    'Iniciando portal…',
    'Calibrando mente…',
    'Sincronizando…',
    'Abrindo portal…',
    'Entrando!'
  ];

  let secs = TOTAL;

  function tick() {
    secs--;
    if (secs <= 0) {
      numEl.textContent = '0';
      msgEl.textContent = '🚀 Entrando!';
      arc.style.strokeDashoffset = ARC_LEN;

      // Activate warp
      warpActive = true;
      document.getElementById('warp-overlay').classList.add('go');

      setTimeout(() => {
        window.location.href = 'http://naruarpg.gamer.gd/narua.php';
      }, 850);
      return;
    }
    numEl.textContent = secs;
    msgEl.textContent = msgs[TOTAL - secs] || 'Aguarde…';
    const pct = (TOTAL - secs) / TOTAL;
    arc.style.strokeDashoffset = pct * ARC_LEN;
  }

  setInterval(tick, 1000);
  </script>
</body>
</html>
